    polite:
      - "不好意思，这件事需要延期，我这边会尽快补上后续安排。"
      - "抱歉，这次进度比预期慢一些，我会尽快把下一步安排同步给你。"
    direct:
      - "这件事要延期了，我先和你说明一下。"
      - "这次没能按原计划推进，我先向你说明情况。"
