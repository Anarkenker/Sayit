      - "这件事确实会延期，我这边会尽快给出新的时间安排。"
      - "这次延后已经确定，我会直接同步新的推进时间。"
    soft:
      - "抱歉，这件事这次可能要往后顺一点，我会尽快把安排补给你。"
      - "不好意思，这次没能按原计划推进，我会尽快补上后续。"
