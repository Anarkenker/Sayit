intent: follow_up
audiences:
  default:
    polite:
      - "想跟你确认一下这件事目前的进度，看看有没有我能配合的地方。"
      - "想同步一下这件事的当前状态，方便的话也请告知后续安排。"
    direct:
      - "这件事我们这边时间有点紧，方便的话想同步一下当前进展。"
      - "麻烦同步一下这件事现在的处理进度，便于我继续往下安排。"
    firm:
      - "这件事已经影响到后续安排了，麻烦尽快给我一个明确的时间点。"
      - "这边需要基于你的进度继续推进，请尽快明确当前状态和下一步时间。"
    soft:
      - "想轻轻跟进一下这件事的进度，你方便时回复我就行。"
      - "怕打扰你，还是想确认一下这件事现在推进到哪一步了。"
