intent: negotiation
audiences:
  default:
    polite:
      - "这个价格对我们来说确实有点高，想看看还有没有调整空间。"
      - "目前这个报价有点超出预算，方便的话想再沟通一下。"
    direct:
      - "这个价格超出我们的预算了，看看还能不能再调一点。"
      - "按现在这个报价不太好推进，想确认下是否还有优惠空间。"
    firm:
      - "按这个价格我们这边没法继续推进，除非条件能再优化一些。"
      - "这个报价目前无法接受，需要你这边再给一个更可执行的方案。"
    soft:
      - "这个价格对我们来说稍微有点压力，想问问还有没有调整余地。"
      - "目前预算有点卡，想和你再商量一下价格空间。"
