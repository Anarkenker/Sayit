intent: request
audiences:
  default:
    polite:
      - "方便的话，麻烦你先帮我处理一下这件事。"
      - "想请你协助跟进一下这件事，辛苦了。"
    direct:
      - "麻烦你先处理一下这件事，处理完和我说一声。"
      - "这件事需要你先推进一下，方便时给我个反馈。"
    firm:
      - "这件事需要你尽快处理，并给我一个明确回复。"
      - "请优先处理这件事，避免继续影响后续安排。"
    soft:
      - "如果你这边方便的话，想请你先帮我看一下这件事。"
      - "不忙的时候，麻烦你帮我跟进一下这件事。"
