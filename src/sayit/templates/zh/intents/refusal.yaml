intent: refusal
audiences:
  default:
    polite:
      - "我这边这次可能没法参加，先跟你说一声，免得你那边等。"
      - "这次我先不参与了，也提前和你同步一下。"
    direct:
      - "我这边这次来不了，就先不去了。"
      - "这次我没法参加，先和你确认一下。"
    firm:
      - "这次我不能参加，也不会调整这个安排。"
      - "这件事我这边没法接受，就先按不参加处理。"
    soft:
      - "我今天临时不太方便过去，这次先不参加了。"
      - "这次我可能不太方便到场，就先和你说一下。"
